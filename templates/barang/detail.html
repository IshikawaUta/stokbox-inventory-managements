{% extends "base.html" %}
{% block title %}Detail Barang{% endblock %}
{% block page_title %}Detail Barang{% endblock %}
{% block page_action %}
<a href="/barang" class="btn btn-light">
    <i class="bi bi-arrow-left"></i> Kembali
</a>
{% if is_admin %}
<a href="/barang/{{ barang_id }}/edit" class="btn btn-primary">
    <i class="bi bi-pencil"></i> Edit
</a>
{% endif %}
{% endblock %}

{% block content %}
<div id="detailContent" class="text-center py-5">
    <div class="spinner"></div>
    <div class="text-secondary mt-2">Memuat data...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const BARANG_ID = {{ barang_id|tojson }};

const TIPE_LABEL = {
    masuk: '<span class="badge text-bg-success">Masuk</span>',
    keluar: '<span class="badge text-bg-danger">Keluar</span>',
    penyesuaian: '<span class="badge text-bg-info">Penyesuaian</span>',
    edit_stok_awal: '<span class="badge text-bg-primary">Edit Awal</span>',
    batal_penyesuaian: '<span class="badge text-bg-warning">Batal Penyesuaian</span>',
};

const ENTITAS_LABEL = {
    barang: 'Barang', kategori: 'Kategori', suplier: 'Suplier',
    barang_masuk: 'Barang Masuk', barang_keluar: 'Barang Keluar',
    stok_penyesuaian: 'Penyesuaian Stok', user: 'User',
    setting: 'Setting', backup: 'Backup',
};

async function loadDetail() {
    try {
        const d = await api.get(`/api/barang/${BARANG_ID}`);
        render(d);
        initRiwayat();
        loadRiwayat();
    } catch (err) {
        document.getElementById('detailContent').innerHTML =
            `<div class="text-danger">${escapeHtml(err.message)}</div>`;
    }
}

function render(d) {
    const foto = d.foto && d.foto.url
        ? `<img src="${d.foto.url}" class="preview-photo rounded" alt="">`
        : `<div class="preview-placeholder"><i class="bi bi-box"></i></div>`;
    const stok = parseInt(d.stok || 0);
    const min = parseInt(d.stok_minimum || 0);
    const status = stok === 0 ? '<span class="badge badge-status-habis">Habis</span>'
        : stok <= min ? '<span class="badge badge-status-hampir">Hampir Habis</span>'
        : '<span class="badge badge-status-tersedia">Tersedia</span>';
    document.getElementById('detailContent').outerHTML = `
    <div id="detailContent">
        <div class="panel mb-3">
            <div class="panel-body">
                <div class="row g-3">
                    <div class="col-md-2 text-center">${foto}</div>
                    <div class="col-md-10">
                        <h4 class="mb-1">${escapeHtml(d.nama_barang)}</h4>
                        <div class="text-secondary mono mb-2">${escapeHtml(d.kode_barang)}</div>
                        <table class="table table-sm table-borderless mb-0" style="max-width: 600px">
                            <tr><th width="120" class="text-secondary fw-normal">Kategori</th><td>${d.nama_kategori ? `<i class="bi ${d.icon_kategori || 'bi-tag'}"></i> ${escapeHtml(d.nama_kategori)}` : '-'}</td></tr>
                            <tr><th class="text-secondary fw-normal">Satuan</th><td>${escapeHtml(d.satuan || '-')}</td></tr>
                            <tr><th class="text-secondary fw-normal">Lokasi</th><td>${escapeHtml(d.lokasi_barang || '-')}</td></tr>
                            <tr><th class="text-secondary fw-normal">Stok</th><td><strong>${formatNumber(stok)}</strong> ${status}</td></tr>
                            <tr><th class="text-secondary fw-normal">Stok Minimum</th><td>${formatNumber(min)}</td></tr>
                            <tr><th class="text-secondary fw-normal">Dibuat</th><td>${formatDateTime(d.created_at)}</td></tr>
                            <tr><th class="text-secondary fw-normal">Diubah</th><td>${formatDateTime(d.updated_at)}</td></tr>
                        </table>
                        ${d.deskripsi_barang ? `<hr><p class="text-secondary mb-0">${escapeHtml(d.deskripsi_barang)}</p>` : ''}
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="panel h-100">
                    <div class="panel-header"><h6 class="panel-title">QR Code</h6></div>
                    <div class="panel-body text-center">
                        <img src="/api/barcode/barang/${d.id}/qrcode" alt="QR Code" style="max-width:200px; height:200px; background:#fff; padding:8px; border:1px solid var(--admin-border); border-radius:6px">
                        <div class="mt-2"><a href="/api/barcode/barang/${d.id}/qrcode" target="_blank" class="btn btn-sm btn-light">Unduh</a></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel h-100">
                    <div class="panel-header"><h6 class="panel-title">Barcode</h6></div>
                    <div class="panel-body text-center">
                        <img src="/api/barcode/barang/${d.id}/barcode" alt="Barcode" style="max-width:100%; height:80px; background:#fff; padding:8px; border:1px solid var(--admin-border); border-radius:6px">
                        <div class="mt-2"><a href="/api/barcode/barang/${d.id}/barcode" target="_blank" class="btn btn-sm btn-light">Unduh</a></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="panel mt-3">
            <div class="panel-header"><h6 class="panel-title">Riwayat Stok</h6></div>
            <div class="panel-body pb-0">
                <div class="row g-2 align-items-end mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control form-control-sm" id="filterRiwayatKeyword" placeholder="Cari no. transaksi atau keterangan...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select form-select-sm" id="filterRiwayatTipe">
                            <option value="">Semua Tipe</option>
                            <option value="masuk">Masuk</option>
                            <option value="keluar">Keluar</option>
                            <option value="penyesuaian">Penyesuaian</option>
                            <option value="edit_stok_awal">Edit Stok Awal</option>
                            <option value="batal_penyesuaian">Batal Penyesuaian</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-light btn-sm w-100" id="btnResetRiwayat"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
                    </div>
                </div>
            </div>
            <div class="panel-body p-0">
                <div class="table-responsive">
                    <table class="table table-sm align-middle mb-0">
                        <thead><tr><th>Waktu</th><th>Tipe</th><th class="text-end">Sebelum</th><th class="text-end">Perubahan</th><th class="text-end">Sesudah</th><th>Referensi</th><th>Keterangan</th></tr></thead>
                        <tbody id="riwayatBody">
                            <tr><td colspan="7" class="text-center py-4"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
                    <div class="text-secondary small" id="riwayatInfo"></div>
                    <nav id="riwayatPagination"></nav>
                </div>
            </div>
        </div>
    </div>`;
}

let riwayatState = { page: 1, perPage: 15, totalPages: 1, filters: { keyword: '', tipe: '' } };
let _riwayatBound = false;
let _riwayatDebounce = null;

function initRiwayat() {
    if (_riwayatBound) return;
    _riwayatBound = true;

    _riwayatDebounce = debounce(() => { riwayatState.page = 1; loadRiwayat(); }, 300);

    document.addEventListener('input', (e) => {
        if (e.target && e.target.id === 'filterRiwayatKeyword') {
            riwayatState.filters.keyword = e.target.value;
            _riwayatDebounce();
        }
    });

    document.addEventListener('change', (e) => {
        if (e.target && e.target.id === 'filterRiwayatTipe') {
            riwayatState.filters.tipe = e.target.value;
            riwayatState.page = 1;
            loadRiwayat();
        }
    });

    document.addEventListener('click', (e) => {
        const btn = e.target.closest('#btnResetRiwayat');
        if (btn) {
            riwayatState.filters = { keyword: '', tipe: '' };
            riwayatState.page = 1;
            const kw = document.getElementById('filterRiwayatKeyword');
            const tp = document.getElementById('filterRiwayatTipe');
            if (kw) kw.value = '';
            if (tp) tp.value = '';
            loadRiwayat();
        }
    });

    document.addEventListener('click', (e) => {
        const link = e.target.closest('a[data-page]');
        if (link) {
            e.preventDefault();
            const p = parseInt(link.dataset.page);
            if (p >= 1 && p <= riwayatState.totalPages) { riwayatState.page = p; loadRiwayat(); }
        }
    });
}

async function loadRiwayat() {
    const container = document.getElementById('riwayatBody');
    if (!container) return;
    try {
        const params = new URLSearchParams();
        params.set('page', riwayatState.page);
        params.set('per_page', riwayatState.perPage);
        if (riwayatState.filters.keyword) params.set('keyword', riwayatState.filters.keyword);
        if (riwayatState.filters.tipe) params.set('tipe', riwayatState.filters.tipe);

        const res = await api.get(`/api/barang/${BARANG_ID}/riwayat-stok?${params}`);
        const items = res.data || [];
        riwayatState.totalPages = res.total_pages || 1;
        const total = res.total || 0;

        if (!items.length) {
            container.innerHTML = '<tr><td colspan="7" class="text-center text-secondary py-4">Belum ada riwayat perubahan stok.</td></tr>';
            document.getElementById('riwayatInfo').textContent = '';
            document.getElementById('riwayatPagination').innerHTML = '';
            return;
        }

        container.innerHTML = items.map(r => {
            const perubahan = parseInt(r.perubahan || 0);
            const cls = perubahan > 0 ? 'text-success' : (perubahan < 0 ? 'text-danger' : 'text-secondary');
            const icon = perubahan > 0 ? '▲' : (perubahan < 0 ? '▼' : '•');
            const tipeLabel = TIPE_LABEL[r.tipe] || escapeHtml(r.tipe);
            return `<tr>
                <td class="text-nowrap small">${formatDateTime(r.created_at)}</td>
                <td>${tipeLabel}</td>
                <td class="text-end">${formatNumber(r.stok_sebelum)}</td>
                <td class="text-end fw-semibold ${cls}">${icon} ${formatNumber(Math.abs(perubahan))}</td>
                <td class="text-end fw-semibold">${formatNumber(r.stok_sesudah)}</td>
                <td class="small">${r.ref_no ? escapeHtml(r.ref_no) : '-'}</td>
                <td class="small text-secondary">${escapeHtml(r.keterangan || '-')}</td>
            </tr>`;
        }).join('');

        const start = (riwayatState.page - 1) * riwayatState.perPage + 1;
        const end = Math.min(riwayatState.page * riwayatState.perPage, total);
        document.getElementById('riwayatInfo').textContent = `Menampilkan ${start}–${end} dari ${total} riwayat`;

        renderRiwayatPagination();
    } catch (err) {
        container.innerHTML = `<tr><td colspan="7" class="text-danger text-center py-4">${escapeHtml(err.message)}</td></tr>`;
    }
}

function renderRiwayatPagination() {
    const nav = document.getElementById('riwayatPagination');
    if (!nav || riwayatState.totalPages <= 1) { if (nav) nav.innerHTML = ''; return; }

    let html = '<ul class="pagination pagination-sm mb-0">';
    html += `<li class="page-item ${riwayatState.page <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" data-page="${riwayatState.page - 1}">&laquo;</a></li>`;

    const range = 2;
    let startPage = Math.max(1, riwayatState.page - range);
    let endPage = Math.min(riwayatState.totalPages, riwayatState.page + range);

    if (startPage > 1) {
        html += `<li class="page-item"><a class="page-link" href="#" data-page="1">1</a></li>`;
        if (startPage > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
    }
    for (let i = startPage; i <= endPage; i++) {
        html += `<li class="page-item ${i === riwayatState.page ? 'active' : ''}">
            <a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
    }
    if (endPage < riwayatState.totalPages) {
        if (endPage < riwayatState.totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        html += `<li class="page-item"><a class="page-link" href="#" data-page="${riwayatState.totalPages}">${riwayatState.totalPages}</a></li>`;
    }

    html += `<li class="page-item ${riwayatState.page >= riwayatState.totalPages ? 'disabled' : ''}">
        <a class="page-link" href="#" data-page="${riwayatState.page + 1}">&raquo;</a></li>`;
    html += '</ul>';
    nav.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', loadDetail);
</script>
{% endblock %}
